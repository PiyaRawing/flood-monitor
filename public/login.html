<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบรายงานสถานการณ์น้ำ</title>

    <link rel="icon" type="image/png" href="/icons/flood_main.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #F3F4F6;
            background-image: radial-gradient(circle, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 16px 16px;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="/icons/flood_main.png" alt="โลโก้ระบบ" class="h-20 w-20">
        </div>

        <div class="bg-white rounded-xl shadow-xl p-8">
            <h1 class="text-2xl font-bold text-center text-gray-900 mb-2">
                สำหรับผู้ดูแลระบบ
            </h1>
            <p class="text-center text-gray-600 mb-6">
                กรุณาเข้าสู่ระบบเพื่อจัดการจุดวัด
            </p>

            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <!-- Error Message -->
                <div id="error-message" class="hidden p-3 rounded-lg bg-red-50 border border-red-200">
                    <p class="text-sm font-medium text-red-700">
                        อีเมลหรือรหัสผ่านไม่ถูกต้อง
                    </p>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        อีเมล
                    </label>
                    <input type="email" id="email" name="email"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
                        required
                        placeholder="admin@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        รหัสผ่าน
                    </label>
                    <input type="password" id="password" name="password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500"
                        required
                        placeholder="••••••••">
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" id="login-button"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-150">
                        เข้าสู่ระบบ
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Back to Home -->
        <div class="mt-6 text-center">
            <a href="/" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">
                &larr; กลับหน้าหลัก
            </a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';
            loginButton.disabled = true;
            loginButton.innerText = 'กำลังตรวจสอบ...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                if (response.ok) {
                    // ถ้า Login สำเร็จ, เซิร์ฟเวอร์จะ Redirect เราไปหน้า Admin
                    // เราแค่ต้อง Reload หน้า (ซึ่งจะพาไปหน้า Admin อัตโนมัติ)
                    window.location.href = '/admin.html';
                } else {
                    // ถ้าไม่สำเร็จ (เช่น รหัสผิด)
                    errorMessage.style.display = 'block';
                    loginButton.disabled = false;
                    loginButton.innerText = 'เข้าสู่ระบบ';
                }

            } catch (error) {
                console.error('Login error:', error);
                errorMessage.style.display = 'block';
                errorMessage.querySelector('p').innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
                loginButton.disabled = false;
                loginButton.innerText = 'เข้าสู่ระบบ';
            }
        });
    </script>

</body>

</html>
